<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nexor University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- GSAP & Vanilla Tilt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 overflow-x-hidden">
    <div class="app-container flex min-h-screen">
        <!-- Sidebar injected by layout.js -->

        <div class="main-content w-full opacity-0"> <!-- Opacity 0 for GSAP entrance -->
            <!-- Header injected by layout.js -->

            <div class="dashboard-stats grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="tilt-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 bg-gradient-to-br from-white to-blue-50 dark:from-gray-800 dark:to-gray-800"
                    data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2"><i
                            class="fa-solid fa-graduation-cap text-blue-500 mr-2"></i> CGPA</h3>
                    <p id="cgpa-val" class="text-4xl font-extrabold text-gray-800 dark:text-white">..</p>
                </div>
                <div class="tilt-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 bg-gradient-to-br from-white to-purple-50 dark:from-gray-800 dark:to-gray-800"
                    data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2"><i
                            class="fa-solid fa-scroll text-purple-500 mr-2"></i> Credits</h3>
                    <p id="credits-val" class="text-4xl font-extrabold text-gray-800 dark:text-white">..</p>
                </div>
                <div class="tilt-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 bg-gradient-to-br from-white to-red-50 dark:from-gray-800 dark:to-gray-800"
                    data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2"><i
                            class="fa-solid fa-money-bill-wave text-red-500 mr-2"></i> Due Fees</h3>
                    <p id="fees-val" class="text-4xl font-extrabold text-gray-800 dark:text-white">..</p>
                </div>
                <div class="tilt-card bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 bg-gradient-to-br from-white to-teal-50 dark:from-gray-800 dark:to-gray-800"
                    data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2"><i
                            class="fa-solid fa-book-open text-teal-500 mr-2"></i> Courses</h3>
                    <p id="courses-val" class="text-4xl font-extrabold text-gray-800 dark:text-white">..</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div
                    class="lg:col-span-2 bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 gs-reveal">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-6 border-b dark:border-gray-700 pb-2">
                        Academic Performance</h3>
                    <canvas id="cgpaChart"></canvas>
                </div>
                <div
                    class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 gs-reveal">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-6 border-b dark:border-gray-700 pb-2">
                        Notifications</h3>
                    <ul id="notifications-list" class="space-y-4 text-sm text-gray-600 dark:text-gray-300">
                        <li><i class="fa-solid fa-spinner fa-spin"></i> Loading...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
